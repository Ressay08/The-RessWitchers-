   <script>
    // 1. Firebase Config dyalk l-asliya
    const firebaseConfig = {
        apiKey: "AIzaSyCE64rBluqsfHj2E3-kHFxF1xydRHRmcg8",
        authDomain: "resswitchers-comments.firebaseapp.com",
        databaseURL: "https://resswitchers-comments-default-rtdb.firebaseio.com",
        projectId: "resswitchers-comments",
        storageBucket: "resswitchers-comments.firebasestorage.app",
        messagingSenderId: "950245756584",
        appId: "1:950245756584:web:d8cb3578a009b3c3b6fc9d",
        measurementId: "G-BEZ1X7R1DT"
    };

    // 2. Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 3. Fonction bach n-sifto l-comment
    function sendComment() {
        const nameInput = document.getElementById('userName');
        const msgInput = document.getElementById('userMsg');
        
        const name = nameInput.value || "Anonymous";
        const msg = msgInput.value;

        if(!msg.trim()) {
            alert("Kteb chi message a sahbi!");
            return;
        }

        // Sauvgardi f l-path 'comments' li drna f l-Rules
        db.ref('comments').push().set({
            name: name,
            message: msg,
            timestamp: Date.now()
        }).then(() => {
            // Khwi l-fields mlli idouz l-comment
            msgInput.value = "";
            nameInput.value = "";
        }).catch((error) => {
            console.error("Error:", error);
            alert("Mabghach idouz! Check l-Rules f Firebase.");
        });
    }

    // 4. Listen for Comments (Realtime)
    db.ref('comments').on('value', (snapshot) => {
        const list = document.getElementById('commentsList');
        list.innerHTML = "";
        const data = snapshot.val();

        if(!data) {
            list.innerHTML = "<p class='text-center text-[10px] opacity-30 uppercase tracking-widest'>No feedback yet.</p>";
            return;
        }

        // Rj3 l-comments b-tartib (jdid l-foq)
        const entries = Object.entries(data).reverse();
        
        entries.forEach(([id, comment]) => {
            list.innerHTML += `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 transition hover:bg-white/10 mb-3">
                    <p class="text-cyan-400 text-[9px] font-bold mb-1 uppercase tracking-tighter">${comment.name}</p>
                    <p class="text-white/70 text-[11px] leading-relaxed font-light">${comment.message}</p>
                </div>
            `;
        });
    });
</script>
